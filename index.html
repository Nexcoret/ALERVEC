<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Alarma Vecinos - Manquimávida 5</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    [x-cloak] { display: none !important; }
    .animate-ring { animation: ring 1.5s infinite; }
    @keyframes ring { 0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); } 100% { box-shadow: 0 0 0 20px rgba(239, 68, 68, 0); } }
  </style>
</head>

<body class="bg-slate-100 font-sans antialiased">

  <div x-data="alarmaApp()" x-init="init()" class="min-h-screen flex items-center justify-center p-4">

    <div class="w-full max-w-sm bg-white rounded-[2.5rem] shadow-2xl overflow-hidden border border-slate-200 relative" style="min-height: 660px;">

      <div class="bg-slate-900 px-6 py-6 flex items-center gap-3">
        <div class="w-10 h-10 rounded-xl bg-amber-500 flex items-center justify-center shadow-lg">
          <i data-lucide="shield-check" class="w-5 h-5 text-white"></i>
        </div>
        <div class="flex-1">
          <p class="text-white font-bold text-sm leading-tight">Sistema de Seguridad</p>
          <p class="text-slate-400 text-[10px] uppercase tracking-widest" x-text="estado === 'inicio' ? 'Identificado: ' + usuario.telefono : 'Verificando...'"></p>
        </div>
        <button @click="irAAdmin()" class="text-slate-600 hover:text-white transition-colors">
            <i data-lucide="settings" class="w-4 h-4"></i>
        </button>
      </div>

      <div x-show="estado === 'cargando'" class="p-8 flex flex-col items-center justify-center text-center h-[500px]">
        <div class="w-12 h-12 border-4 border-slate-200 border-t-amber-500 rounded-full animate-spin mb-4"></div>
        <p class="text-slate-500 font-bold text-xs">RECONOCIENDO NÚMERO...</p>
      </div>

      <div x-show="estado === 'no_registrado'" x-cloak class="p-8 flex flex-col items-center justify-center text-center h-[500px] animate-in fade-in">
        <div class="bg-red-50 p-6 rounded-full mb-6">
            <i data-lucide="phone-off" class="w-12 h-12 text-red-500"></i>
        </div>
        <h2 class="text-slate-900 text-xl font-black mb-2 uppercase">NÚMERO NO AUTORIZADO</h2>
        <p class="text-slate-500 text-sm mb-8" x-text="'El teléfono ' + usuario.telefono + ' no tiene permiso para emitir alertas.'"></p>
        <button @click="window.location.reload()" class="w-full bg-slate-900 text-white py-4 rounded-2xl font-bold">REINTENTAR</button>
      </div>

      <div x-show="estado === 'inicio'" x-cloak class="p-6 animate-in slide-in-from-bottom duration-500">
        <div class="mb-8">
            <p class="text-slate-400 text-xs font-bold uppercase mb-1">Bienvenido(a)</p>
            <p class="text-slate-900 text-2xl font-black" x-text="usuario.nombre"></p>
            <p class="text-amber-600 text-sm font-bold" x-text="'📍 Depto: ' + usuario.depto"></p>
        </div>

        <div class="space-y-4">
            <button @click="enviarAlerta('AFUERA')" class="w-full bg-white border-2 border-amber-500 rounded-3xl p-5 text-left flex items-center gap-4 active:scale-95 transition-all shadow-sm">
                <span class="text-4xl">👀</span>
                <div>
                    <p class="text-slate-900 font-black text-lg leading-tight">SOSPECHOSOS</p>
                    <p class="text-slate-500 text-xs font-medium italic">Ruidos o personas extrañas</p>
                </div>
            </button>

            <button @click="enviarAlerta('ADENTRO')" class="w-full bg-red-600 rounded-3xl p-6 text-left flex items-center gap-4 active:scale-95 transition-all shadow-xl shadow-red-200">
                <span class="text-4xl">🆘</span>
                <div>
                    <p class="text-white font-black text-xl leading-tight uppercase">Emergencia</p>
                    <p class="text-red-100 text-xs opacity-80">Peligro inmediato en casa</p>
                </div>
            </button>
        </div>

        <div class="mt-12 pt-6 border-t border-slate-100">
            <button @click="abrirWhatsAppGrupo()" class="w-full flex items-center justify-center gap-2 text-green-600 font-bold text-sm">
                <i data-lucide="message-circle" class="w-4 h-4"></i>
                IR AL GRUPO DE VECINOS
            </button>
        </div>
      </div>

      <div x-show="estado === 'alerta_enviada'" x-cloak class="absolute inset-0 bg-red-600 z-50 flex flex-col items-center justify-center p-8 text-center animate-pulse">
          <div class="w-32 h-32 bg-white rounded-full flex items-center justify-center mb-8 animate-ring">
              <i data-lucide="bell" class="w-16 h-16 text-red-600"></i>
          </div>
          <h2 class="text-white text-3xl font-black mb-4">ALERTA ACTIVA</h2>
          <p class="text-red-100 mb-8 font-medium italic">Vecinos notificados. WhatsApp grupal abierto.</p>
          <button @click="estado = 'inicio'" class="bg-white text-red-600 px-8 py-3 rounded-full font-black text-sm">VOLVER AL PANEL</button>
      </div>

    </div>
  </div>

  <script>
    function alarmaApp() {
      return {
        // CAMBIA ESTO POR TU URL DE GOOGLE APPS SCRIPT
        apiUrl: 'https://script.google.com/macros/s/AKfycbxvUanLVeg2KEUq9yfelxzjbUjOcwHRh4LuhW_OsRKrLbh3VdR9_h8d5pR0ByQVnohR/exec',
        
        estado: 'cargando',
        usuario: { telefono: '', nombre: '', depto: '' },

        init() {
          lucide.createIcons();
          // Intentamos obtener el teléfono de la APK
          this.obtenerTelefonoDesdeApp();
        },

        obtenerTelefonoDesdeApp() {
          if (typeof window.AppInventor !== "undefined") {
            let jsonString = window.AppInventor.getWebViewString();
            if (jsonString) {
              try {
                let data = JSON.parse(jsonString);
                this.usuario.telefono = data.telefono; // Formato esperado: +569XXXXXXXX
                this.validarIdentidad();
              } catch (e) { this.estado = 'no_registrado'; }
            } else { this.estado = 'no_registrado'; }
          } else {
            // TEST EN PC: Número de prueba
            this.usuario.telefono = '+56944527951'; 
            this.validarIdentidad();
          }
        },

        async validarIdentidad() {
          try {
            const res = await fetch(`${this.apiUrl}?action=verificar_inscrito&telefono=${this.usuario.telefono}`);
            const data = await res.json();
            if (data.success) {
              this.usuario.nombre = data.nombre;
              this.usuario.depto = data.depto;
              this.estado = 'inicio';
            } else {
              this.estado = 'no_registrado';
            }
          } catch (e) { this.estado = 'no_registrado'; }
          this.$nextTick(() => lucide.createIcons());
        },

        async enviarAlerta(tipo) {
          // 1. Notificar al servidor (Registro en Google Sheets)
          try {
            await fetch(this.apiUrl, {
              method: 'POST',
              mode: 'no-cors',
              body: JSON.stringify({
                action: 'nueva_alerta',
                tipo: tipo,
                telefono: this.usuario.telefono
              })
            });
            
            this.estado = 'alerta_enviada';

            // 2. Vincular a WhatsApp
            const mensaje = `🚨 *ALERTA DE SEGURIDAD - MANQUIMÁVIDA 5* 🚨\n\n👤 *Emisor:* ${this.usuario.nombre}\n📍 *Ubicación:* Depto ${this.usuario.depto}\n⚠️ *Tipo:* ${tipo === 'AFUERA' ? 'Actividad sospechosa afuera' : 'EMERGENCIA EN EL DOMICILIO'}\n📞 *Teléfono:* ${this.usuario.telefono}\n\n_Favor verificar cámaras o salir con precaución._`;
            
            // Abrir WhatsApp con el mensaje pre-cargado
            window.open(`https://wa.me/?text=${encodeURIComponent(mensaje)}`, '_blank');

          } catch (e) {
            alert("Error al conectar con la central.");
          }
          this.$nextTick(() => lucide.createIcons());
        },

        abrirWhatsAppGrupo() {
            // Aquí puedes poner el link directo a tu grupo de WhatsApp
            window.open('https://chat.whatsapp.com/TU_LINK_AQUI', '_blank');
        },

        irAAdmin() {
            alert("Acceso administrativo requiere validación externa.");
        }
      }
    }
  </script>
</body>
</html>
