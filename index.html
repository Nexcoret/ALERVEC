<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Alarma Manquimávida 5</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    [x-cloak] {
      display: none !important;
    }

    body {
      overflow: hidden;
      position: fixed;
      width: 100%;
      height: 100%;
      background-color: #0f172a;
    }
  </style>
</head>

<body class="font-sans antialiased">
  <div x-data="alarmaApp()" x-init="init()" class="h-screen flex items-center justify-center p-2">
    <div
      class="w-full max-w-sm bg-white rounded-[2rem] shadow-2xl overflow-hidden border border-slate-200 relative h-[98vh]">

      <div class="bg-slate-900 px-6 py-4 flex items-center gap-3">
        <div class="w-10 h-10 rounded-xl bg-amber-500 flex items-center justify-center shadow-lg">
          <i data-lucide="shield" class="w-5 h-5 text-white"></i>
        </div>
        <div class="flex-1">
          <p class="text-white font-bold text-base leading-tight">Alarma Vecinos</p>
          <p class="text-slate-400 text-[10px] uppercase tracking-wider"
            x-text="usuario.depto ? 'Depto ' + usuario.depto : 'Conectando...'"></p>
        </div>
      </div>

      <div x-show="estado === 'login'" class="p-8 flex flex-col items-center justify-center text-center h-full">
        <div class="bg-amber-100 p-5 rounded-full mb-6 text-amber-600"><i data-lucide="key-round" class="w-8 h-8"></i>
        </div>
        <h2 class="text-xl font-black text-slate-900 mb-2 uppercase italic">Vincular Teléfono</h2>
        <input type="number" x-model="codigoIngresado" placeholder="0000"
                 class="w-full bg-slate-100 border-2 rounded-2xl p-4 text-center text-3xl font-bold tracking-[8px] outline-none mb-6">
        <button @click="ingresar()" :disabled="buscando"
                  class="w-full bg-slate-900 text-white py-4 rounded-2xl font-bold disabled:opacity-50">
              <span x-text="buscando ? 'CONECTANDO...' : 'ACTIVAR'"></span>
          </button>
      </div>

      <div x-show="estado === 'inicio'" class="p-6 h-full overflow-y-auto pb-24" x-cloak>
        <button @click="seleccionarAlarma('Sospechosos')" class="w-full bg-amber-500 rounded-3xl p-6 mb-4 text-left shadow-lg active:scale-95 transition-all">
            <div class="text-4xl mb-2">👀</div>
            <p class="text-white text-xl font-black italic uppercase">Sospechosos</p>
          </button>
        <button @click="seleccionarAlarma('Emergencia')" class="w-full bg-red-600 rounded-3xl p-6 mb-8 text-left shadow-lg active:scale-95 transition-all">
            <div class="text-4xl mb-2">🆘</div>
            <p class="text-white text-xl font-black italic uppercase">Emergencia</p>
          </button>
        <div class="grid grid-cols-3 gap-2 border-t pt-4">
          <a href="tel:133" class="bg-blue-50 text-blue-600 rounded-xl py-3 text-center font-black text-[10px]">133</a>
          <a href="tel:131" class="bg-red-50 text-red-600 rounded-xl py-3 text-center font-black text-[10px]">131</a>
          <a href="tel:132"
            class="bg-orange-50 text-orange-600 rounded-xl py-3 text-center font-black text-[10px]">132</a>
        </div>
      </div>

      <div x-show="estado === 'recibiendo'"
        class="absolute inset-0 bg-red-600 z-50 p-8 flex flex-col items-center justify-center text-center text-white"
        x-cloak>
        <div class="animate-bounce mb-6"><i data-lucide="octagon-alert" class="w-20 h-20"></i></div>
        <h2 class="text-2xl font-black mb-2" x-text="'DEPTO ' + alertaEntrante.depto"></h2>
        <button @click="responderAlerta(alertaEntrante.tipo === 'Sospechosos' ? 'Recibido' : 'En camino')"
                  class="w-full bg-white text-red-600 py-5 rounded-2xl font-black uppercase">
              <span x-text="alertaEntrante.tipo === 'Sospechosos' ? '✅ RECIBIDO' : '🏃 VOY'"></span>
          </button>
      </div>

      <div x-show="estado === 'activa'" class="p-6 h-full bg-slate-50 flex flex-col" x-cloak>
        <p class="text-center font-black text-red-600 animate-pulse mb-4">ALERTA ACTIVA</p>
        <div class="bg-white rounded-3xl p-5 shadow-inner flex-1 overflow-y-auto">
          <template x-for="res in respuestasRecibidas">
            <p class="text-xs font-bold text-slate-700 mb-2" x-text="'✓ ' + res"></p>
          </template>
        </div>
        <button @click="estado = 'inicio'" class="w-full bg-slate-900 text-white py-4 rounded-2xl font-bold mt-4">CERRAR</button>
      </div>

    </div>
  </div>

  <script>
    function alarmaApp() {
      return {
        // ASEGÚRATE QUE ESTA URL SEA LA DE TU SCRIPT ACTUALIZADO
        apiUrl: 'https://script.google.com/macros/s/AKfycbxqPPM3-SUt8eQEQVPIpsMYoyjbHTWi1E4wbA6y4FGbI7rJmtQ7FFSq19S10R1euhdt1A/exec',
        estado: 'login',
        codigoIngresado: '',
        buscando: false,
        usuario: { nombre: '', depto: '' },
        alertaEntrante: {},
        respuestasRecibidas: [],
        audioAlarma: new Audio('https://assets.mixkit.co/active_storage/sfx/951/951-preview.mp3'),

        init() {
          lucide.createIcons();
          this.audioAlarma.loop = true;
          const savedCod = localStorage.getItem('user_cod_v2');
          if (savedCod) { this.codigoIngresado = savedCod; setTimeout(() => this.ingresar(true), 1000); }
          this.$watch('estado', () => this.$nextTick(() => lucide.createIcons()));
        },

        async ingresar(silent = false) {
          if (!this.codigoIngresado) return;
          this.buscando = true;
          try {
            // Cambiamos fetch por una técnica más compatible con WebViews antiguos
            const response = await fetch(`${this.apiUrl}?action=validar_codigo&codigo=${this.codigoIngresado}`, {
                method: 'GET',
                redirect: 'follow'
            });
            const data = await response.json();
            if (data.success) {
              this.usuario = data;
              localStorage.setItem('user_cod_v2', this.codigoIngresado);
              this.estado = 'inicio';
              this.iniciarEscucha();
            } else if (!silent) alert("Código no válido");
          } catch (e) {
            console.error(e);
            if (!silent) alert("Error de Conexión: Revisa que el Script esté publicado para 'Anyone'");
          }
          this.buscando = false;
        },

        async seleccionarAlarma(tipo) {
          this.estado = 'activa';
          this.respuestasRecibidas = [];
          fetch(this.apiUrl, {
            method: 'POST',
            mode: 'no-cors',
            body: JSON.stringify({ action: 'nueva_alerta', tipo, nombre: this.usuario.nombre, depto: this.usuario.depto })
          });
          this.monitorearRespuestas();
        },

        async responderAlerta(status) {
          this.pararSonido();
          fetch(this.apiUrl, {
            method: 'POST',
            mode: 'no-cors',
            body: JSON.stringify({ action: 'responder_alerta', vecino: this.usuario.nombre, status: status })
          });
          this.estado = 'inicio';
        },

        iniciarEscucha() {
          setInterval(async () => {
            if (this.estado !== 'inicio') return;
            try {
              const res = await fetch(`${this.apiUrl}?action=escuchar_alertas`);
              const data = await res.json();
              if (data.length > 0 && data[0].depto !== this.usuario.depto) {
                this.alertaEntrante = data[0];
                this.estado = 'recibiendo';
                this.audioAlarma.play().catch(() => {});
              }
            } catch (e) {}
          }, 5000);
        },

        monitorearRespuestas() {
          const timer = setInterval(async () => {
            if (this.estado !== 'activa') return clearInterval(timer);
            try {
              const res = await fetch(`${this.apiUrl}?action=escuchar_alertas`);
              const data = await res.json();
              if (data.length > 0 && data[0].respuestas) {
                this.respuestasRecibidas = data[0].respuestas.split('|');
              }
            } catch (e) {}
          }, 4000);
        },

        pararSonido() { this.audioAlarma.pause(); this.audioAlarma.currentTime = 0; }
      }
    }
  </script>
</body>

</html>
