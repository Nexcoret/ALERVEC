<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Seguridad Vecinal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-slate-900">
    <div x-data="app()" x-init="init()" class="min-h-screen flex items-center justify-center p-4">
        <div class="w-full max-w-sm bg-white rounded-[2rem] shadow-2xl overflow-hidden relative" style="min-height: 550px;">
            
            <div x-show="estado === 'login'" class="p-8 flex flex-col items-center justify-center h-[550px]">
                <div class="bg-amber-100 p-4 rounded-full mb-4"><i data-lucide="key" class="text-amber-600"></i></div>
                <h1 class="text-xl font-bold mb-2">Activar Sistema</h1>
                <input type="number" x-model="codigo" placeholder="Código de 4 dígitos" class="w-full border-2 p-4 rounded-xl text-center text-2xl mb-4 outline-none focus:border-slate-900">
                <button @click="ingresar()" class="w-full bg-slate-900 text-white py-4 rounded-xl font-bold">INGRESAR</button>
            </div>

            <div x-show="estado === 'panel'" x-cloak>
                <div class="bg-slate-900 p-6 text-white">
                    <p class="text-xs opacity-50 uppercase">Residente</p>
                    <p class="font-bold text-lg" x-text="user.nombre"></p>
                </div>
                <div class="p-6 space-y-4">
                    <button @click="alerta('SOSPECHOSOS')" class="w-full bg-amber-500 p-6 rounded-2xl text-white font-bold text-left shadow-lg active:scale-95 transition-all">
                        <p class="text-2xl uppercase italic">Sospechosos</p>
                        <p class="text-xs opacity-80">Aviso preventivo afuera</p>
                    </button>
                    <button @click="alerta('EMERGENCIA')" class="w-full bg-red-600 p-6 rounded-2xl text-white font-bold text-left shadow-lg active:scale-95 transition-all">
                        <p class="text-2xl uppercase italic text-center">Emergencia</p>
                    </button>
                </div>
            </div>

            <div x-show="estado === 'recibiendo'" x-cloak class="absolute inset-0 bg-red-600 z-50 p-8 flex flex-col items-center justify-center text-center text-white">
                <div class="animate-bounce mb-4"><i data-lucide="alert-triangle" class="w-20 h-20"></i></div>
                <h2 class="text-3xl font-black mb-2 uppercase">¡Alerta!</h2>
                <p class="text-4xl font-bold mb-4" x-text="'DEPTO ' + incoming.depto"></p>
                <p class="mb-8" x-text="incoming.emisor + ' reporta ' + incoming.tipo"></p>
                <button @click="estado = 'panel'" class="bg-white text-red-600 px-8 py-3 rounded-full font-bold">ENTENDIDO</button>
            </div>
        </div>
    </div>

    <script>
        function app() {
            return {
                apiUrl: 'https://script.google.com/macros/s/AKfycbyHpoB2pdDvYE3Lg38Q4K0z8QW3q8XNDXPsfOD51fKFKvdDsKLgzYyvHiR0JPxaYipiQg/exec',
                estado: 'login',
                codigo: '',
                user: { nombre: '', depto: '' },
                incoming: { emisor: '', depto: '', tipo: '' },

                init() {
                    lucide.createIcons();
                    const saved = localStorage.getItem('user_cod');
                    if (saved) { this.codigo = saved; this.ingresar(); }
                },

                async ingresar() {
                    const res = await fetch(`${this.apiUrl}?action=validar_codigo&codigo=${this.codigo}`);
                    const data = await res.json();
                    if (data.success) {
                        this.user = data;
                        localStorage.setItem('user_cod', this.codigo);
                        this.estado = 'panel';
                        this.escuchar();
                    } else { alert("Código no válido"); }
                    this.$nextTick(() => lucide.createIcons());
                },

                async alerta(tipo) {
                    await fetch(this.apiUrl, {
                        method: 'POST',
                        mode: 'no-cors',
                        body: JSON.stringify({ action: 'nueva_alerta', tipo, nombre: this.user.nombre, depto: this.user.depto })
                    });
                    alert("Alerta enviada a los vecinos");
                },

                escuchar() {
                    setInterval(async () => {
                        if (this.estado !== 'panel') return;
                        const res = await fetch(`${this.apiUrl}?action=escuchar_alertas`);
                        const data = await res.json();
                        if (data.length > 0 && data[0].depto !== this.user.depto) {
                            this.incoming = data[0];
                            this.estado = 'recibiendo';
                            this.$nextTick(() => lucide.createIcons());
                        }
                    }, 5000);
                }
            }
        }
    </script>
</body>
</html>
